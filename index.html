<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>LeetCode AI 学习笔记</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="AI 辅助 LeetCode 学习笔记 · 模板化解题 · 主动回忆" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    /* GitHub Docs 风格配色 */
    :root {
      --theme-color: #0969da;            /* GitHub 链接蓝 */
      --bg-page: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-code: #f6f8fa;
      --bg-inline-code: rgba(175,184,193,0.2);
      --text-main: #1f2328;
      --text-muted: #59636e;
      --border-soft: #d1d9e0;
      --border-strong: #afb8c1;
      --sidebar-width: 296px;
    }
    html, body { background: var(--bg-page); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", "Helvetica Neue",
                   "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Sidebar */
    .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border-soft); padding-top: 12px; }
    .sidebar > h1 { margin: 0.6em 15px; font-size: 1.1rem; font-weight: 600; }
    .sidebar > h1 a { color: var(--text-main) !important; }
    .sidebar-nav { padding: 0 8px; line-height: 1.7; }
    .sidebar-nav ul { padding-left: 14px; }
    .sidebar-nav li > a {
      color: var(--text-main);
      font-weight: 400;
      padding: 2px 6px;
      border-radius: 6px;
      display: inline-block;
    }
    .sidebar-nav li > a:hover { background: var(--bg-code); color: var(--theme-color); text-decoration: none; }
    .sidebar-nav li.active > a { color: var(--theme-color); font-weight: 600; background: #ddf4ff; }
    .sidebar-nav > ul > li > a { font-weight: 600; font-size: 0.95rem; }

    /* Content */
    .content { background: var(--bg-page); }
    .markdown-section { max-width: 920px; color: var(--text-main); padding: 30px 45px 40px; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 { color: var(--text-main); font-weight: 600; }
    .markdown-section h1 { font-size: 2em; }
    .markdown-section h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-soft); padding-bottom: 0.3em; margin-top: 1.5em; }
    .markdown-section h3 { font-size: 1.25em; }
    .markdown-section a { color: var(--theme-color); text-decoration: none; }
    .markdown-section a:hover { text-decoration: underline; }
    .markdown-section blockquote { border-left: 4px solid var(--border-soft); background: transparent; color: var(--text-muted); padding: 0 1em; }
    .markdown-section pre { background: var(--bg-code); border-radius: 6px; }
    .markdown-section pre > code { font-size: 0.85rem; background: transparent; color: var(--text-main); }
    .markdown-section code:not(pre code) {
      background: var(--bg-inline-code);
      color: var(--text-main);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 85%;
    }
    .markdown-section table { display: table; width: 100%; border: 1px solid var(--border-soft); border-radius: 6px; overflow: hidden; }
    .markdown-section table th { background: var(--bg-code); font-weight: 600; }
    .markdown-section table tr { background: var(--bg-page); border-top: 1px solid var(--border-soft); }
    .markdown-section table tr:nth-child(2n) { background: var(--bg-code); }
    .markdown-section hr { border: 0; border-top: 1px solid var(--border-soft); margin: 24px 0; }

    /* Search box */
    .search input { border: 1px solid var(--border-soft) !important; border-radius: 6px !important; background: var(--bg-code) !important; }
    .search input:focus { border-color: var(--theme-color) !important; background: var(--bg-page) !important; }
    .search .results-panel { background: var(--bg-page); }

    /* Folder toggle (plain-text parents with a child <ul>) */
    .sidebar-nav li.folder { cursor: default; }
    .sidebar-nav li.folder > span.folder-label {
      cursor: pointer;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      user-select: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .sidebar-nav li.folder > span.folder-label:hover { background: var(--bg-code); color: var(--theme-color); }
    .sidebar-nav li.folder > span.folder-label::before {
      content: "▸";
      display: inline-block;
      width: 1em;
      color: var(--text-muted);
      transition: transform 0.15s ease;
    }
    .sidebar-nav li.folder.open > span.folder-label::before { transform: rotate(90deg); }
    .sidebar-nav li.folder > ul { display: none; }
    .sidebar-nav li.folder.open > ul { display: block; }

    /* Misc */
    .app-name-link { color: var(--text-main) !important; }
    .sidebar-toggle { background: transparent; }
    .sidebar-toggle span { background-color: var(--text-main); }
    .progress { background-color: var(--theme-color); }
    .docsify-pagination-container { border-top: 1px solid var(--border-soft); }
    .docsify-pagination-container a { color: var(--theme-color) !important; }
  </style>
</head>
<body>
  <div id="app">加载中……</div>
  <script>
    window.$docsify = {
      name: 'LeetCode AI 学习笔记',
      repo: 'liukun2634/leetcode-ai-java',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 0,
      relativePath: false,
      plugins: [
        function (hook) {
          // Persist + toggle text-only sidebar folders across page navigation
          const STORE_KEY = 'lcai-sidebar-open';
          const getOpen = () => {
            try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]')); }
            catch (e) { return new Set(); }
          };
          const saveOpen = (set) => localStorage.setItem(STORE_KEY, JSON.stringify([...set]));
          hook.doneEach(function () {
            const nav = document.querySelector('.sidebar-nav');
            if (!nav) return;
            const openSet = getOpen();
            nav.querySelectorAll('li').forEach(li => {
              const ul = li.querySelector(':scope > ul');
              if (!ul) return;
              // Find a leading text node that's not already wrapped
              let labelText = '';
              for (const node of li.childNodes) {
                if (node.nodeType === 3 && node.textContent.trim()) {
                  labelText = node.textContent.trim();
                  node.remove();
                  break;
                }
                if (node.nodeType === 1 && node.tagName === 'SPAN' && node.classList.contains('folder-label')) {
                  labelText = ''; // already processed
                  break;
                }
              }
              if (!labelText) return;
              const span = document.createElement('span');
              span.className = 'folder-label';
              span.textContent = labelText;
              li.classList.add('folder');
              li.insertBefore(span, ul);
              if (openSet.has(labelText)) li.classList.add('open');
              span.addEventListener('click', (ev) => {
                ev.stopPropagation();
                li.classList.toggle('open');
                const s = getOpen();
                if (li.classList.contains('open')) s.add(labelText); else s.delete(labelText);
                saveOpen(s);
              });
              // Auto-open if a descendant link matches current route
              const active = ul.querySelector('li.active');
              if (active && !li.classList.contains('open')) {
                li.classList.add('open');
                const s = getOpen(); s.add(labelText); saveOpen(s);
              }
            });
          });
        }
      ],
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        depth: 3,
        noData: '没有结果',
        placeholder: '搜索题目 / 标签 / 关键字',
        hideOtherSidebarContent: false,
        pathNamespaces: ['/interview-prep', '/java-toolkit']
      },
      pagination: {
        previousText: '上一题',
        nextText: '下一题',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制'
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
</body>
</html>
